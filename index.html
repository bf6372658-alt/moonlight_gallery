<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Gallery</title>
    
    <style>
        /* --- GENERAL STYLING --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #efefef;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* --- PINTEREST GRID STYLING --- */
        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 20px;
            justify-content: center;
        }

        .pin-card {
            width: 250px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: zoom-in; /* Shows the user they can click to enlarge */
        }

        .pin-card:hover {
            transform: scale(1.02);
        }

        .pin-card img {
            width: 100%;
            display: block;
            border-bottom: 1px solid #eee;
        }

        .pin-info {
            padding: 15px;
        }

        .pin-info h3 {
            margin: 0 0 5px 0;
            font-size: 18px;
        }

        .pin-info p {
            margin: 0;
            color: #555;
            font-size: 14px;
        }

        /* --- THE PINTEREST POP (MODAL) --- */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9); /* Dark background */
            backdrop-filter: blur(8px); /* Blurs the site behind the pop-up */
        }

        .modal-content {
            margin: auto;
            display: block;
            width: auto;
            max-width: 90%;
            max-height: 80vh;
            border-radius: 12px;
            margin-top: 50px;
            border: 3px solid white;
        }

        #caption {
            margin: auto;
            display: block;
            width: 80%;
            text-align: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 20px 0;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Moonlight Gallery</h1>
        {% if user.is_authenticated %}
            <p>Welcome back, <strong>Ace</strong>! | <a href="/admin/logout/">Logout</a></p>
        {% else %}
            <p><a href="/admin/login/">Log in</a> to manage the gallery.</p>
        {% endif %}
    </header>

    <div class="gallery-container">
        {% for item in items %}
            <div class="pin-card" onclick="enlargeImage('{{ item.image.url }}', '{{ item.title }}')">
                <img src="{{ item.image.url }}" alt="{{ item.title }}">
                <div class="pin-info">
                    <h3>{{ item.title }}</h3>
                    <p>{{ item.description }}</p>
                </div>
            </div>
        {% empty %}
            <p>No posts yet. Go to the admin panel to add some!</p>
        {% endfor %}
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="enlargedImg">
        <div id="caption"></div>
    </div>

    <script>
        function enlargeImage(src, title) {
            var modal = document.getElementById("imageModal");
            var modalImg = document.getElementById("enlargedImg");
            var captionText = document.getElementById("caption");
            
            modal.style.display = "block";
            modalImg.src = src;
            captionText.innerHTML = title;
        }

        function closeModal() {
            document.getElementById("imageModal").style.display = "none";
        }

        // Close modal if user presses "Escape" key
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeModal();
            }
        });
    </script>
</body>
</html>
